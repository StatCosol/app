<app-table-toolbar
  [enableSearch]="enableSearch"
  [enableColumnChooser]="enableColumnChooser"
  [query]="query"
  [columns]="columns"
  (searchChange)="onSearch($event)"
  (limitChange)="setLimit($event)"
  (columnsChange)="onColumnsUpdated($event)">
</app-table-toolbar>

<div class="bg-white rounded-2xl border border-gray-100 shadow-card overflow-hidden">
  <div class="overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-100">
      <thead class="bg-gradient-to-b from-gray-50 to-gray-100/80">
        <tr>
          <!-- Checkbox header -->
          <th *ngIf="enableSelection" class="px-4 py-3 w-10">
            <input type="checkbox"
              class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
              [checked]="isAllSelected()"
              (change)="toggleAll($any($event.target).checked)" />
          </th>

          <!-- Column headers -->
          <th *ngFor="let col of visibleColumns()"
            class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider"
            [style.width]="col.width"
            [class.cursor-pointer]="col.sortable"
            [class.select-none]="col.sortable"
            [class.hover:bg-gray-100]="col.sortable"
            (click)="sortBy(col)">
            <div class="flex items-center gap-1">
              <span>{{ col.label }}</span>
              <ng-container *ngIf="col.sortable">
                <span *ngIf="query.sort === col.key"
                  class="text-blue-600 text-[10px]">
                  {{ query.order === 'ASC' ? '▲' : '▼' }}
                </span>
                <span *ngIf="query.sort !== col.key"
                  class="text-gray-300 text-[10px]">⇅</span>
              </ng-container>
            </div>
          </th>

          <!-- Actions header -->
          <th *ngIf="rowActionsTpl"
            class="px-4 py-3 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">
            Actions
          </th>
        </tr>
      </thead>

      <tbody class="bg-white divide-y divide-gray-100">
        <!-- Loading -->
        <tr *ngIf="loading">
          <td [attr.colspan]="colSpan()" class="px-6 py-12 text-center">
            <div class="flex items-center justify-center gap-3">
              <svg class="animate-spin h-6 w-6 text-accent-400" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              <span class="text-gray-500 text-sm">Loading...</span>
            </div>
          </td>
        </tr>

        <!-- Data rows -->
        <ng-container *ngIf="!loading">
          <tr *ngFor="let row of rows" class="hover:bg-gray-50 transition-colors">
            <!-- Checkbox -->
            <td *ngIf="enableSelection" class="px-4 py-3">
              <input type="checkbox"
                class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
                [checked]="isSelected(row)"
                (change)="toggleRow(row, $any($event.target).checked)" />
            </td>

            <!-- Cells -->
            <td *ngFor="let col of visibleColumns()" class="px-4 py-3 text-sm text-gray-900 whitespace-nowrap">
              <ng-container *ngIf="!cellTpl">{{ displayCell(col, row) }}</ng-container>
              <ng-container *ngIf="cellTpl"
                [ngTemplateOutlet]="cellTpl"
                [ngTemplateOutletContext]="{ $implicit: row, col: col, value: displayCell(col, row) }">
              </ng-container>
            </td>

            <!-- Row actions -->
            <td *ngIf="rowActionsTpl" class="px-4 py-3 text-right">
              <ng-container
                [ngTemplateOutlet]="rowActionsTpl"
                [ngTemplateOutletContext]="{ $implicit: row }">
              </ng-container>
            </td>
          </tr>
        </ng-container>

        <!-- Empty state -->
        <tr *ngIf="!loading && (!rows || rows.length === 0)">
          <td [attr.colspan]="colSpan()" class="px-6 py-12 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gray-100 mb-3">
              <svg class="h-8 w-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
              </svg>
            </div>
            <p class="text-sm text-gray-500">{{ emptyMessage }}</p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination footer -->
  <div *ngIf="enablePagination && !loading && rows.length > 0"
    class="px-4 py-3 border-t border-gray-100 bg-gray-50/60 flex items-center justify-between">
    <div class="text-sm text-gray-500">
      Showing {{ startItem }} to {{ endItem }} of {{ total }} results
    </div>
    <div class="inline-flex items-center gap-3 rounded-2xl border border-gray-200 bg-white px-3 py-2 shadow-sm">
      <button
        type="button"
        class="inline-flex h-8 w-8 items-center justify-center rounded-full text-gray-700 transition hover:bg-gray-100 disabled:cursor-not-allowed disabled:opacity-40"
        [disabled]="query.page <= 1"
        (click)="goToPage(query.page - 1)"
        aria-label="Previous page">
        <svg class="h-4 w-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12.5 5L7.5 10L12.5 15" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </button>

      <div class="flex items-center gap-2 text-3xl leading-none font-semibold text-gray-900">
        <span class="text-base font-semibold text-gray-900">Page</span>
        <input
          type="number"
          min="1"
          [max]="totalPages()"
          [value]="query.page"
          (keydown.enter)="commitPageInput($event)"
          (blur)="commitPageInput($event)"
          class="h-10 w-12 rounded-lg border border-blue-300 bg-white text-center text-lg font-medium text-gray-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
          aria-label="Current page" />
        <span class="text-base font-semibold text-gray-900">of {{ totalPages() }}</span>
      </div>

      <button
        type="button"
        class="inline-flex h-8 w-8 items-center justify-center rounded-full text-gray-700 transition hover:bg-gray-100 disabled:cursor-not-allowed disabled:opacity-40"
        [disabled]="query.page >= totalPages()"
        (click)="goToPage(query.page + 1)"
        aria-label="Next page">
        <svg class="h-4 w-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M7.5 5L12.5 10L7.5 15" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </button>
    </div>
  </div>
</div>
