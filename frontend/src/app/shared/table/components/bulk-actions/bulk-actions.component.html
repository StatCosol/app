<div *ngIf="selectedCount > 0"
  class="flex items-center gap-3 px-4 py-3 mb-4 rounded-xl bg-blue-50 border border-blue-200">
  <span class="inline-flex items-center px-2.5 py-0.5 rounded-lg bg-blue-100 text-sm font-semibold text-blue-800">
    {{ selectedCount }} selected
  </span>

  <div class="flex gap-2 ml-auto">
    <button *ngFor="let a of actions"
      class="px-3 py-1.5 rounded-xl text-sm font-medium transition-colors"
      [class.bg-red-600]="a.danger"
      [class.text-white]="a.danger"
      [class.hover:bg-red-700]="a.danger"
      [class.bg-white]="!a.danger"
      [class.text-gray-700]="!a.danger"
      [class.border]="!a.danger"
      [class.border-gray-300]="!a.danger"
      [class.hover:bg-gray-50]="!a.danger"
      (click)="action.emit(a.key)">
      {{ a.label }}
    </button>
  </div>
</div>
