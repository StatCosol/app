<div class="relative">
  <button class="px-3 py-2 rounded-xl border border-gray-300 text-gray-700 text-sm
                 hover:bg-gray-50 transition-colors flex items-center gap-1.5"
    (click)="toggle()">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
    </svg>
    Columns
  </button>

  <!-- Dropdown -->
  <div *ngIf="open"
    class="absolute right-0 top-full mt-1 w-56 bg-white rounded-xl border border-gray-100
           shadow-lg z-50 py-2 max-h-64 overflow-y-auto">
    <label *ngFor="let c of columns"
      class="flex items-center gap-2 px-3 py-1.5 hover:bg-gray-50 cursor-pointer text-sm text-gray-700">
      <input type="checkbox"
        class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
        [checked]="!c.hidden"
        (change)="set(c, $any($event.target).checked)" />
      {{ c.label }}
    </label>
  </div>
</div>
