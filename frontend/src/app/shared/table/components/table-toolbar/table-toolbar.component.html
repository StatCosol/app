<div class="flex flex-wrap items-center gap-3 mb-4">
  <!-- Search -->
  <div *ngIf="enableSearch" class="flex-1 min-w-[200px]">
    <input type="text"
      class="w-full rounded-xl border-gray-300 shadow-sm text-sm placeholder-gray-400
             focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      placeholder="Search..."
      [value]="q"
      (input)="onQChange($any($event.target).value)" />
  </div>

  <div class="flex items-center gap-2 ml-auto">
    <!-- Page size -->
    <select class="rounded-xl border-gray-300 text-sm focus:ring-2 focus:ring-blue-500"
      (change)="setLimit($any($event.target).value)">
      <option [selected]="query.limit === 10" value="10">10 / page</option>
      <option [selected]="query.limit === 20" value="20">20 / page</option>
      <option [selected]="query.limit === 50" value="50">50 / page</option>
      <option [selected]="query.limit === 100" value="100">100 / page</option>
    </select>

    <!-- Column chooser -->
    <app-column-chooser
      *ngIf="enableColumnChooser"
      [columns]="columns"
      (changed)="onColumns($event)">
    </app-column-chooser>
  </div>
</div>
