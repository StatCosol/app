<div class="max-w-3xl mx-auto px-4 sm:px-6 py-6">
  <div class="card">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">Create Query</h2>

    <div class="space-y-6">
      <div class="form-group">
        <label class="block text-sm font-medium text-gray-700 mb-2">Query Type</label>
        <select class="w-full rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light" [(ngModel)]="queryType">
          <option value="TECHNICAL">Technical Query (to Admin)</option>
          <option value="COMPLIANCE">Compliance Query (to CRM)</option>
          <option value="AUDIT">Audit Query (to Auditor)</option>
        </select>
      </div>

      <div class="form-group">
        <label class="block text-sm font-medium text-gray-700 mb-2">Subject</label>
        <input
          type="text"
          class="w-full rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light"
          [(ngModel)]="subject"
          placeholder="Short subject (min 3 characters)"
        />
        <small class="text-xs text-gray-500 mt-1 block">If you leave it blank, we'll auto-fill a subject for you.</small>
      </div>

      <div class="form-group">
        <label class="block text-sm font-medium text-gray-700 mb-2">Message</label>
        <textarea
          class="w-full rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light"
          [(ngModel)]="message"
          rows="5"
          placeholder="Explain your issue..."
        ></textarea>
      </div>

      <button
        class="btn-primary w-full"
        type="button"
        (click)="submit()"
        [disabled]="isSubmitting"
      >
        <svg class="w-4 h-4 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
        {{ isSubmitting ? 'Submitting...' : 'Submit' }}
      </button>

      <div class="alert alert-success" *ngIf="resultText">{{ resultText }}</div>
    </div>
  </div>
</div>
