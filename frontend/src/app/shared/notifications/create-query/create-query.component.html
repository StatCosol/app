<div class="max-w-3xl mx-auto px-4 sm:px-6 py-6">
  <div class="card">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">Create Query</h2>

    <div class="space-y-6">
      <div class="form-group">
        <label class="block text-sm font-medium text-gray-700 mb-2" for="cq-query-type">Query Type</label>
        <select id="cq-query-type" name="queryType" class="w-full rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light" [(ngModel)]="queryType">
          <option value="TECHNICAL">Technical Query (to Admin)</option>
          <option value="COMPLIANCE">Compliance Query (to CRM)</option>
          <option value="AUDIT">Audit Query (to Auditor)</option>
        </select>
      </div>

      <div class="form-group">
        <label class="block text-sm font-medium text-gray-700 mb-2" for="cq-subject">Subject</label>
        <input autocomplete="off" id="cq-subject"
          type="text"
          name="querySubject"
          class="w-full rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light"
          [(ngModel)]="subject"
          placeholder="Short subject (min 3 characters)"
        />
        <small class="text-xs text-gray-500 mt-1 block">If you leave it blank, we'll auto-fill a subject for you.</small>
      </div>

      <div class="form-group">
        <label class="block text-sm font-medium text-gray-700 mb-2" for="cq-message">Message</label>
        <textarea autocomplete="off" id="cq-message"
          name="queryMessage"
          class="w-full rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light"
          [(ngModel)]="message"
          rows="5"
          placeholder="Explain your issue..."
        ></textarea>
      </div>

      <ui-button
        variant="primary" [fullWidth]="true"
        type="button"
        (clicked)="submit()"
        [disabled]="isSubmitting"
        [loading]="isSubmitting">
        Submit
      </ui-button>

      <div class="alert alert-success" *ngIf="resultText">{{ resultText }}</div>
    </div>
  </div>
</div>
