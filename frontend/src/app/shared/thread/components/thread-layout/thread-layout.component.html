<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
  <div class="lg:col-span-1" [class.hidden]="showDetail" [class.lg:block]="showDetail">
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
      <div class="p-4 border-b border-gray-200">
        <h2 class="text-lg font-semibold text-gray-900">{{ title }}</h2>
      </div>

      <app-thread-filters (changed)="onFiltersChange($event)"></app-thread-filters>

      <div class="p-3">
        <thread-inbox-list
          [items]="inboxItems"
          [selectedId]="selectedId || ''"
          (selected)="selectInboxItem($event)">
        </thread-inbox-list>
      </div>

      <div *ngIf="page && page.total > (filters.limit || 20)"
        class="flex items-center justify-between px-4 py-3 border-t border-gray-200 text-sm">
        <span class="text-gray-500">
          Page {{ page.page }} - {{ page.total }} total
        </span>
        <div class="flex gap-2">
          <button class="px-3 py-1 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed text-sm"
            [disabled]="(page.page || 1) <= 1"
            (click)="goToPage((page.page || 1) - 1)">Prev</button>
          <button class="px-3 py-1 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed text-sm"
            [disabled]="(page.page || 1) * (page.limit || 20) >= page.total"
            (click)="goToPage((page.page || 1) + 1)">Next</button>
        </div>
      </div>
    </div>
  </div>

  <div class="lg:col-span-2" [class.hidden]="!showDetail && !selected" [class.lg:block]="true">
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
      <button class="lg:hidden flex items-center gap-2 px-4 py-3 text-sm text-statco-blue hover:bg-gray-50 w-full border-b border-gray-200"
        (click)="backToList()">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Back to list
      </button>

      <div *ngIf="loadingThread" class="p-8">
        <div class="animate-pulse space-y-4">
          <div class="h-4 bg-gray-200 rounded w-1/3"></div>
          <div class="h-3 bg-gray-100 rounded w-1/2"></div>
          <div class="space-y-3 mt-6">
            <div class="h-16 bg-gray-100 rounded"></div>
            <div class="h-16 bg-gray-100 rounded"></div>
            <div class="h-16 bg-gray-100 rounded"></div>
          </div>
        </div>
      </div>

      <div *ngIf="!loadingThread && !selected" class="p-12 text-center">
        <svg class="mx-auto h-16 w-16 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
        </svg>
        <p class="text-gray-500 text-sm">Select a thread to view messages.</p>
      </div>

      <ng-container *ngIf="!loadingThread && selected">
        <div class="px-4 py-3 border-b border-gray-200">
          <div class="flex items-start justify-between gap-4">
            <div class="min-w-0">
              <h3 class="text-base font-semibold text-gray-900 truncate">{{ selected.subject }}</h3>
              <div class="flex flex-wrap items-center gap-2 mt-1">
                <span class="text-xs px-1.5 py-0.5 rounded font-medium bg-gray-100 text-gray-600">{{ selected.type }}</span>
                <status-chip [status]="selected.status"></status-chip>
                <priority-chip [priority]="selectedListItem?.priority || 'LOW'"></priority-chip>
              </div>
            </div>

            <div class="flex gap-2 flex-shrink-0">
              <button *ngIf="canResolve && !!api.resolve && isOpen"
                class="px-3 py-1.5 text-sm font-medium rounded-lg border border-green-300 text-green-700 bg-green-50 hover:bg-green-100 transition-colors"
                (click)="resolveThread()">Resolve</button>
              <button *ngIf="canClose && !!api.close && isOpen"
                class="px-3 py-1.5 text-sm font-medium rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition-colors"
                (click)="closeThread()">Close</button>
              <button *ngIf="canReopen && !!api.reopen && isClosed"
                class="px-3 py-1.5 text-sm font-medium rounded-lg border border-blue-300 text-blue-700 bg-blue-50 hover:bg-blue-100 transition-colors"
                (click)="reopenThread()">Reopen</button>
            </div>
          </div>
        </div>

        <div class="px-4 py-4 space-y-4 overflow-y-auto" style="max-height: 50vh;">
          <thread-message-panel [messages]="selectedMessages"></thread-message-panel>

          <div>
            <div class="text-xs font-semibold text-gray-500 uppercase mb-2">Activity Timeline</div>
            <shared-timeline [events]="selectedTimeline" emptyMessage="No timeline entries."></shared-timeline>
          </div>
        </div>

        <div *ngIf="isClosed" class="px-4 py-3 bg-gray-50 border-t border-gray-200 text-center">
          <p class="text-sm text-gray-500 italic">This thread is {{ selected.status.toLowerCase() }}.</p>
        </div>
      </ng-container>

      <app-composer
        [disabled]="!selected || selected.status === 'CLOSED' || selected.status === 'RESOLVED'"
        [sending]="sending"
        (send)="sendReply($event)">
      </app-composer>
    </div>
  </div>
</div>
