<div class="divide-y divide-gray-200" style="max-height: 60vh; overflow-y: auto;">
  <!-- Loading skeleton -->
  <div *ngIf="loading" class="p-4 space-y-3">
    <div *ngFor="let _ of [1,2,3,4,5]" class="animate-pulse">
      <div class="h-3 bg-gray-200 rounded w-3/4 mb-2"></div>
      <div class="h-2 bg-gray-100 rounded w-1/2"></div>
    </div>
  </div>

  <!-- Empty state -->
  <div *ngIf="!loading && (!items || items.length === 0)" class="p-8 text-center">
    <svg class="mx-auto h-12 w-12 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
    </svg>
    <p class="text-sm text-gray-500">No threads found.</p>
  </div>

  <!-- Thread items -->
  <button *ngFor="let t of items"
    type="button"
    class="w-full text-left px-4 py-3 hover:bg-gray-50 transition-colors focus:outline-none focus:bg-blue-50"
    [class.bg-blue-50]="t.id === selectedId"
    [class.border-l-4]="t.id === selectedId"
    [class.border-l-blue-600]="t.id === selectedId"
    (click)="selected.emit(t)">

    <!-- Badges row -->
    <div class="flex items-center gap-1.5 mb-1.5">
      <span [class]="typeColor(t.type)"
        class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium uppercase tracking-wide">
        {{ t.type }}
      </span>
      <span [class]="statusColor(t.status)"
        class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium uppercase tracking-wide">
        {{ t.status.replace('_', ' ') }}
      </span>
      <span *ngIf="t.unread"
        class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-semibold bg-red-100 text-red-700">
        NEW
      </span>
      <span *ngIf="t.priority === 'HIGH' || t.priority === 'CRITICAL'"
        class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-semibold bg-red-100 text-red-700">
        {{ t.priority }}
      </span>
    </div>

    <!-- Subject -->
    <div class="text-sm font-medium text-gray-900 mb-1 truncate"
      [class.font-bold]="t.unread">
      {{ t.subject || '(No subject)' }}
    </div>

    <!-- Meta -->
    <div class="text-xs text-gray-500 flex items-center gap-1 truncate">
      <span *ngIf="t.fromName || t.fromRole">{{ t.fromName || t.fromRole }}</span>
      <span *ngIf="t.clientName"> · {{ t.clientName }}</span>
      <span *ngIf="t.lastMessageAt" class="ml-auto text-gray-400 flex-shrink-0">
        {{ t.lastMessageAt | date:'shortDate' }}
      </span>
    </div>
  </button>
</div>
