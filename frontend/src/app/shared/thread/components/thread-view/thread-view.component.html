<!-- No thread selected -->
<div *ngIf="!loading && !thread" class="p-12 text-center">
  <svg class="mx-auto h-16 w-16 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
      d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
  </svg>
  <p class="text-gray-500 text-sm">Select a thread to view messages.</p>
</div>

<!-- Loading -->
<div *ngIf="loading" class="p-8">
  <div class="animate-pulse space-y-4">
    <div class="h-4 bg-gray-200 rounded w-1/3"></div>
    <div class="h-3 bg-gray-100 rounded w-1/2"></div>
    <div class="space-y-3 mt-6">
      <div class="h-16 bg-gray-100 rounded"></div>
      <div class="h-16 bg-gray-100 rounded"></div>
      <div class="h-16 bg-gray-100 rounded"></div>
    </div>
  </div>
</div>

<!-- Thread detail -->
<ng-container *ngIf="!loading && thread">
  <!-- Header -->
  <div class="px-4 py-3 border-b border-gray-200">
    <div class="flex items-start justify-between gap-4">
      <div class="min-w-0">
        <h3 class="text-base font-semibold text-gray-900 truncate">{{ thread.subject }}</h3>
        <div class="flex items-center gap-2 mt-1">
          <span class="text-xs px-1.5 py-0.5 rounded font-medium bg-gray-100 text-gray-600">{{ thread.type }}</span>
          <span [class]="statusColor(thread.status)"
            class="text-xs px-1.5 py-0.5 rounded font-medium">{{ thread.status.replace('_', ' ') }}</span>
        </div>
      </div>

      <div class="flex gap-2 flex-shrink-0">
        <button *ngIf="canResolve && isOpen"
          class="px-3 py-1.5 text-sm font-medium rounded-lg border border-green-300
                 text-green-700 bg-green-50 hover:bg-green-100 transition-colors"
          (click)="resolveThread.emit()">Resolve</button>
        <button *ngIf="canClose && isOpen"
          class="px-3 py-1.5 text-sm font-medium rounded-lg border border-gray-300
                 text-gray-700 hover:bg-gray-50 transition-colors"
          (click)="closeThread.emit()">Close</button>
        <button *ngIf="canReopen && isClosed"
          class="px-3 py-1.5 text-sm font-medium rounded-lg border border-blue-300
                 text-blue-700 bg-blue-50 hover:bg-blue-100 transition-colors"
          (click)="reopenThread.emit()">Reopen</button>
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div #messagesContainer class="px-4 py-4 space-y-3 overflow-y-auto" style="max-height: 50vh;">
    <app-message-bubble *ngFor="let m of thread.messages" [msg]="m"></app-message-bubble>

    <div *ngIf="thread.messages.length === 0" class="text-center py-6 text-sm text-gray-400">
      No messages yet.
    </div>
  </div>

  <!-- Closed notice -->
  <div *ngIf="isClosed" class="px-4 py-3 bg-gray-50 border-t border-gray-200 text-center">
    <p class="text-sm text-gray-500 italic">This thread is {{ thread.status.toLowerCase() }}.</p>
  </div>
</ng-container>
