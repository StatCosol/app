<div class="space-y-3">
  <!-- Timeline rows -->
  <div *ngFor="let h of history; let last = last"
    class="relative flex items-start gap-3 pl-6">
    <!-- Timeline dot + line -->
    <div class="absolute left-0 top-1 flex flex-col items-center">
      <div class="w-3 h-3 rounded-full border-2"
        [class]="h.status === 'APPROVED' ? 'border-green-500 bg-green-500' :
                 h.status === 'REJECTED' || h.status === 'RETURNED' || h.status === 'REUPLOAD_REQUESTED' ? 'border-red-400 bg-red-400' :
                 'border-blue-400 bg-blue-400'">
      </div>
      <div *ngIf="!last" class="w-px flex-1 bg-gray-200 mt-1" style="min-height: 24px;"></div>
    </div>

    <!-- Content -->
    <div class="flex-1 min-w-0 pb-3">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="text-sm font-semibold text-gray-900">v{{ h.version }}</span>
        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium"
          [class]="statusColor(h.status)">
          {{ h.status.replace('_', ' ') }}
        </span>
      </div>
      <p class="text-xs text-gray-500 mt-0.5">
        {{ h.file.uploadedAt | date:'dd MMM yyyy, HH:mm' }}
        <span *ngIf="h.decidedByRole"> &middot; {{ h.decidedByRole }}</span>
      </p>
      <p *ngIf="h.remark" class="text-xs text-gray-600 mt-1 italic">&ldquo;{{ h.remark }}&rdquo;</p>

      <!-- Open link -->
      <button type="button" (click)="open(h)"
        class="mt-1 text-xs font-medium text-blue-600 hover:text-blue-800 transition-colors">
        Open file
      </button>
    </div>
  </div>

  <!-- Empty -->
  <div *ngIf="history.length === 0" class="text-center py-8 text-sm text-gray-400">
    No version history yet.
  </div>
</div>
