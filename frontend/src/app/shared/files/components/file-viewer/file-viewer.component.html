<div *ngIf="file" class="flex items-center gap-3 p-3 bg-gray-50 border border-gray-200 rounded-lg">
  <!-- File icon -->
  <div class="w-9 h-9 flex-shrink-0 rounded-lg bg-blue-100 flex items-center justify-center">
    <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
    </svg>
  </div>

  <!-- Info -->
  <div class="flex-1 min-w-0">
    <p class="text-sm font-medium text-gray-900 truncate">{{ file.name }}</p>
    <p class="text-xs text-gray-400">
      {{ file.uploadedAt | date:'dd MMM yyyy, HH:mm' }}
      <span *ngIf="sizeLabel"> &middot; {{ sizeLabel }}</span>
      <span *ngIf="file.uploadedByRole"> &middot; {{ file.uploadedByRole }}</span>
    </p>
  </div>

  <!-- Action -->
  <button type="button" (click)="open()"
    class="inline-flex items-center gap-1 text-sm font-medium text-blue-600 hover:text-blue-800 transition-colors flex-shrink-0">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
    </svg>
    View
  </button>
</div>
