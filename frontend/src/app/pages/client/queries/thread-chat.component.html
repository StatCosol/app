<div class="max-w-4xl mx-auto px-4 sm:px-6 py-6">
  <!-- Loading State -->
  <div *ngIf="loading" class="flex items-center justify-center py-12">
    <svg class="animate-spin h-8 w-8 text-statco-blue-light mr-3" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <span class="text-gray-600">Loading conversation...</span>
  </div>

  <!-- Thread View -->
  <div class="card" *ngIf="thread && !loading">
    <!-- Thread Header -->
    <div class="pb-4 border-b border-gray-200 mb-6">
      <div class="flex items-start justify-between">
        <div class="flex-grow">
          <h2 class="text-2xl font-bold text-gray-900 mb-2">{{thread.subject || 'Query'}}</h2>
          <div class="flex items-center gap-3 text-sm text-gray-600">
            <span class="flex items-center gap-1">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              Status: <b>{{thread.resolvedAt ? 'RESOLVED' : 'OPEN'}}</b>
            </span>
            <span class="text-gray-400">•</span>
            <span class="flex items-center gap-1">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
              </svg>
              {{ escalationLabel() }}
            </span>
          </div>
        </div>
        <button *ngIf="!thread.resolvedAt" class="btn-primary" (click)="resolve()" [disabled]="resolving">
          <svg class="w-4 h-4 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          {{ resolving ? 'Resolving...' : 'Mark Resolved' }}
        </button>
      </div>
    </div>

    <!-- Chat Messages -->
    <div class="space-y-4 mb-6 max-h-[60vh] md:max-h-96 overflow-y-auto">
      <div *ngFor="let m of messages" [class]="m.isMine ? 'flex justify-end' : 'flex justify-start'">
        <div [class]="m.isMine ? 'bg-statco-blue-light text-white' : 'bg-gray-100 text-gray-900'" class="max-w-md rounded-lg px-4 py-3 shadow-sm">
          <p class="text-sm leading-relaxed">{{m.message}}</p>
          <div [class]="m.isMine ? 'text-blue-100' : 'text-gray-500'" class="text-xs mt-1">
            {{m.createdAt || m.created_at}}
          </div>
        </div>
      </div>
    </div>

    <!-- Composer -->
    <div *ngIf="!thread.resolvedAt" class="flex gap-3 pt-4 border-t border-gray-200">
      <input [(ngModel)]="reply" placeholder="Type your reply..." (keyup.enter)="send()" class="flex-grow rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light" />
      <button class="btn-primary" (click)="send()" [disabled]="sending">
        <svg class="w-4 h-4 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
        {{ sending ? 'Sending...' : 'Send' }}
      </button>
    </div>

    <!-- Resolved Notice -->
    <div *ngIf="thread.resolvedAt" class="alert alert-success mt-4">
      <svg class="w-5 h-5 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      This conversation has been marked as resolved.
    </div>
  </div>
</div>
