<div class="max-w-5xl mx-auto px-4 sm:px-6 py-6">
  <ui-page-header
    title="Queries"
    description="Raise and track your support queries"
    icon="chat-alt-2">
  </ui-page-header>

  <!-- Tabs -->
  <div class="flex items-center gap-2 mb-6">
    <button
      (click)="tab='raise'"
      [class]="tab === 'raise' ? 'bg-statco-blue text-white shadow-sm' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
      class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium transition-all"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      Raise Query
    </button>
    <button
      (click)="tab='threads'; !loading && loadThreads()"
      [class]="tab === 'threads' ? 'bg-statco-blue text-white shadow-sm' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
      class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium transition-all"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
      </svg>
      My Threads
      <span *ngIf="threads.length > 0" class="inline-flex items-center justify-center w-5 h-5 text-[10px] font-bold rounded-full"
            [class]="tab === 'threads' ? 'bg-white/20 text-white' : 'bg-gray-200 text-gray-600'">
        {{ threads.length }}
      </span>
    </button>
  </div>

  <!-- Raise Tab -->
  <div *ngIf="tab === 'raise'" class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 rounded-xl bg-statco-blue/10 flex items-center justify-center">
        <svg class="w-5 h-5 text-statco-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <div>
        <h3 class="text-lg font-semibold text-gray-900">Submit a New Query</h3>
        <p class="text-sm text-gray-500">Your query will be routed to the appropriate team</p>
      </div>
    </div>

    <div class="space-y-5">
      <!-- Query Type as cards -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-3">Query Type</label>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
          <button
            *ngFor="let qt of [
              { value: 'COMPLIANCE', label: 'Compliance', desc: 'Routed to CRM', icon: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' },
              { value: 'AUDIT', label: 'Audit', desc: 'Routed to Auditor', icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4' },
              { value: 'TECHNICAL', label: 'Technical', desc: 'Routed to Admin', icon: 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z' }
            ]"
            (click)="form.queryType = qt.value"
            class="flex items-center gap-3 p-4 rounded-xl border transition-all text-left bg-statco-blue"
            [style.border-color]="form.queryType === qt.value ? 'white' : 'transparent'"
            [style.box-shadow]="form.queryType === qt.value ? '0 0 0 2px white' : 'none'"
          >
            <div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 bg-white bg-opacity-20">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="qt.icon"/>
              </svg>
            </div>
            <div>
              <div class="text-sm font-medium text-white">{{ qt.label }}</div>
              <div class="text-xs text-gray-300">{{ qt.desc }}</div>
            </div>
          </button>
        </div>
      </div>

      <ui-form-input
        id="subject"
        label="Subject"
        type="text"
        [(ngModel)]="form.subject"
        placeholder="e.g. PF return clarification">
      </ui-form-input>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Message</label>
        <textarea
          [(ngModel)]="form.message"
          rows="5"
          placeholder="Describe your query in detail..."
          class="w-full rounded-xl border-gray-300 focus:border-statco-blue focus:ring-statco-blue transition-colors"
        ></textarea>
      </div>

      <div class="flex items-center gap-4">
        <button
          (click)="submit()"
          [disabled]="submitting"
          class="inline-flex items-center gap-2 px-6 py-2.5 bg-statco-blue text-white rounded-xl text-sm font-semibold hover:bg-statco-blue/90 disabled:opacity-50 transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
          {{ submitting ? 'Submitting...' : 'Submit Query' }}
        </button>
      </div>

      <div class="flex items-start gap-2 p-3 bg-amber-50 rounded-xl border border-amber-200 text-sm text-amber-800">
        <svg class="w-5 h-5 text-amber-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span>Queries that aren't resolved in time will automatically escalate to CCO and then CEO.</span>
      </div>
    </div>
  </div>

  <!-- Threads Tab -->
  <div *ngIf="tab === 'threads'">
    <ui-loading-spinner *ngIf="loading"></ui-loading-spinner>

    <div *ngIf="!loading" class="space-y-3">
      <div
        *ngFor="let t of threads"
        (click)="openThread(t)"
        class="bg-white rounded-2xl border border-gray-200 p-5 hover:shadow-md hover:border-statco-blue/20 transition-all duration-200 cursor-pointer group"
      >
        <div class="flex items-start justify-between gap-4 mb-3">
          <div class="flex items-center gap-3 min-w-0">
            <div [class]="t.resolvedAt ? 'bg-green-100' : 'bg-blue-100'" class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0">
              <svg *ngIf="!t.resolvedAt" class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
              </svg>
              <svg *ngIf="t.resolvedAt" class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
            <div class="min-w-0">
              <h4 class="font-semibold text-gray-900 truncate group-hover:text-statco-blue transition-colors">{{ t.subject || 'Query' }}</h4>
              <p class="text-xs text-gray-500 mt-0.5">{{ t.queryType || 'General' }}</p>
            </div>
          </div>

          <!-- SLA Badge -->
          <span
            [class]="getSlaClass(t)"
            class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium flex-shrink-0"
          >
            {{ slaText(t) }}
          </span>
        </div>

        <div class="flex items-center justify-between text-xs text-gray-400 pt-2 border-t border-gray-100">
          <span>{{ t.resolvedAt ? 'Resolved' : 'Open' }}</span>
          <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </div>
      </div>

      <ui-empty-state
        *ngIf="threads.length === 0"
        icon="chat-alt-2"
        message="No queries yet. Raise one to get started!">
      </ui-empty-state>
    </div>
  </div>
</div>
