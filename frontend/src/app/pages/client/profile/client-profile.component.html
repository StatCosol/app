<div class="max-w-4xl mx-auto px-4 sm:px-6 py-6">
  <ui-page-header 
    title="My Profile" 
    description="Your account information" 
    icon="user">
  </ui-page-header>

  <!-- Profile Card -->
  <div class="card">
    <div class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <span class="block text-sm font-medium text-gray-500 mb-1">Company</span>
          <div class="text-base text-gray-900">{{user.clientName}}</div>
        </div>
        <div>
          <span class="block text-sm font-medium text-gray-500 mb-1">Contact Name</span>
          <div class="text-base text-gray-900">{{user.contactName}}</div>
        </div>
        <div>
          <span class="block text-sm font-medium text-gray-500 mb-1">Email</span>
          <div class="text-base text-gray-900">{{user.email}}</div>
        </div>
        <div>
          <span class="block text-sm font-medium text-gray-500 mb-1">Phone</span>
          <div class="text-base text-gray-900">{{user.phone || '-'}}</div>
        </div>
        <div class="md:col-span-2">
          <span class="block text-sm font-medium text-gray-500 mb-1">Address</span>
          <div class="text-base text-gray-900">{{user.address || '-'}}</div>
        </div>
      </div>
    </div>
  </div>
</div>
