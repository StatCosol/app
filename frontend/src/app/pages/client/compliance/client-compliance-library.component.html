<div class="page">
  <ui-page-header
    title="Compliance Document Library"
    subtitle="View and download compliance documents uploaded by your CRM">
  </ui-page-header>

  <!-- Tabs -->
  <div class="tabs">
    <button *ngFor="let tab of tabs"
      class="tab-btn"
      [class.active]="activeTab === tab.code"
      (click)="switchTab(tab.code)">
      {{ tab.label }}
      <span *ngIf="tabCounts[tab.code] !== undefined" class="ml-1 text-xs text-gray-400">({{ tabCounts[tab.code] }})</span>
    </button>
  </div>

  <!-- Filters -->
  <div class="filters-row">
    <select class="filter-select" [(ngModel)]="filters.branchId" (ngModelChange)="loadDocuments()"
      *ngIf="branches.length > 1">
      <option value="">All Branches</option>
      <option *ngFor="let b of branches" [value]="b.id">{{ b.name }}</option>
    </select>

    <select class="filter-select" *ngIf="subCategories.length > 0" [(ngModel)]="filters.subCategory" (ngModelChange)="loadDocuments()">
      <option value="">All Types</option>
      <option *ngFor="let sc of subCategories" [value]="sc.code">{{ sc.label }}</option>
    </select>

    <select class="filter-select" [(ngModel)]="filters.periodYear" (ngModelChange)="loadDocuments()">
      <option [ngValue]="null">All Years</option>
      <option *ngFor="let y of yearOptions" [ngValue]="y">{{ y }}</option>
    </select>

    <select class="filter-select" [(ngModel)]="filters.periodMonth" (ngModelChange)="loadDocuments()">
      <option [ngValue]="null">All Months</option>
      <option *ngFor="let m of monthOptions" [ngValue]="m.value">{{ m.label }}</option>
    </select>

    <input class="filter-input" type="text" placeholder="Search by title..."
      [(ngModel)]="filters.search" (keyup.enter)="loadDocuments()" />
  </div>

  <!-- Loading -->
  <ui-loading-spinner *ngIf="loading" text="Loading documents..."></ui-loading-spinner>

  <!-- Empty state -->
  <ui-empty-state
    *ngIf="!loading && filteredDocs.length === 0"
    title="No documents found"
    description="No compliance documents match the current filters. Documents will appear here once your CRM uploads them.">
  </ui-empty-state>

  <!-- Document grid -->
  <div class="doc-grid" *ngIf="!loading && filteredDocs.length > 0">
    <div class="doc-card" *ngFor="let doc of filteredDocs">
      <div class="doc-title">
        <svg class="w-4 h-4 text-blue-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12h6m-6 4h6M9 8h6m2-4H7l-2 2v12a2 2 0 002 2h10a2 2 0 002-2V6a2 2 0 00-2-2z"/>
        </svg>
        {{ doc.title }}
      </div>

      <div class="doc-meta">
        <span *ngIf="doc.subCategory" class="doc-badge">{{ getSubCategoryLabel(doc.subCategory) }}</span>
        <span *ngIf="doc.periodLabel">{{ doc.periodLabel }}</span>
        <span *ngIf="!doc.periodLabel && doc.periodYear">
          {{ doc.periodMonth ? monthOptions[(doc.periodMonth || 1) - 1]?.label : '' }} {{ doc.periodYear }}
        </span>
        <span>{{ formatFileSize(doc.fileSize) }}</span>
        <span>{{ doc.createdAt | date:'mediumDate' }}</span>
      </div>

      <p *ngIf="doc.description" class="text-xs text-gray-500 line-clamp-2">{{ doc.description }}</p>

      <a class="download-btn" [href]="getDownloadUrl(doc.id)" target="_blank">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        Download
      </a>
    </div>
  </div>
</div>
