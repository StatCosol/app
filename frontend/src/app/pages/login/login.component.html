<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-50 to-gray-100 p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-8 space-y-6">
      <!-- LOGO -->
      <div class="flex flex-col items-center space-y-4">
        <img
          src="assets/images/statco-logo.png"
          alt="StatCo Solutions"
          class="h-24 w-auto"
        />
        <div class="text-center">
          <h1 class="text-4xl font-bold text-gray-900 statco-brand-title">StatCo Solutions</h1>
          <p class="text-base text-gray-600 mt-2 statco-caption">Ensuring Compliance, Empowering Success</p>
        </div>
      </div>

      <!-- ERROR -->
      <div *ngIf="error" class="alert error">
        {{ error }}
      </div>

      <!-- FORM -->
      <form class="space-y-4" (submit)="$event.preventDefault(); submit()">
        <!-- EMAIL -->
        <div class="form-group">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">
            Email Address
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <input
              id="email"
              type="email"
              [(ngModel)]="email"
              name="email"
              [disabled]="isLoading"
              autocomplete="username"
              placeholder="you@example.com"
              class="block w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-statco-blue focus:border-transparent transition-all duration-200"
            />
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="form-group">
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">
            Password
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input
              id="password"
              type="password"
              [(ngModel)]="password"
              name="password"
              [disabled]="isLoading"
              autocomplete="current-password"
              placeholder="Enter your password"
              class="block w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-statco-blue focus:border-transparent transition-all duration-200"
            />
          </div>
        </div>

        <!-- FORGOT PASSWORD -->
        <div class="flex items-center justify-end">
          <a
            href="mailto:support@statcosol.com?subject=StatCo%20Comply%20Password%20Reset"
            class="text-sm font-medium text-statco-blue hover:text-statco-blue/80 transition-colors"
          >
            Forgot password?
          </a>
        </div>

        <!-- LOGIN BUTTON -->
        <button
          type="submit"
          (click)="submit()"
          [disabled]="isLoading"
          class="w-full flex items-center justify-center px-4 py-3 bg-statco-blue text-white font-medium rounded-lg hover:bg-statco-blue/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-statco-blue transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed shadow-sm"
        >
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="flex items-center gap-3">
            <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Signing in...
          </span>
        </button>
      </form>

      <!-- SUPPORT -->
      <div class="pt-6 border-t border-gray-200">
        <p class="text-sm font-medium text-gray-900 text-center mb-3">Need help?</p>
        <div class="space-y-2">
          <a
            href="mailto:support@statcosol.com"
            class="flex items-center justify-center gap-2 text-sm text-gray-600 hover:text-statco-blue transition-colors"
          >
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
            support@statcosol.com
          </a>
          <a
            href="tel:+919000607839"
            class="flex items-center justify-center gap-2 text-sm text-gray-600 hover:text-statco-blue transition-colors"
          >
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
            </svg>
            +91 9000607839
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
