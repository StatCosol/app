<div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
  <ui-page-header
    title="Payroll Client Settings"
    description="Per-client payroll defaults, statutory toggles, cycle rules, and validation controls"
    icon="adjustments-horizontal">
  </ui-page-header>

  <ui-loading-spinner *ngIf="loading" text="Loading payroll client settings..."></ui-loading-spinner>

  <div *ngIf="error" class="alert alert-error mb-4">{{ error }}</div>

  <div *ngIf="!loading" class="workspace-grid">
    <section class="workspace-card list-panel">
      <div class="panel-head">
        <h3>Clients</h3>
        <span class="count-pill">{{ filteredClients.length }} visible</span>
      </div>

      <div class="filter-row">
        <input
          type="text"
          placeholder="Search client..."
          [(ngModel)]="search"
          (ngModelChange)="applyFilters()" />
        <select [(ngModel)]="statusFilter" (ngModelChange)="applyFilters()">
          <option value="ALL">All</option>
          <option value="CONFIGURED">Configured</option>
          <option value="PENDING">Pending setup</option>
        </select>
      </div>

      <div class="client-list" *ngIf="filteredClients.length; else noClients">
        <button
          type="button"
          *ngFor="let client of filteredClients; trackBy: trackByClientId"
          class="client-row"
          [class.client-row--active]="client.id === selectedClientId"
          (click)="selectClient(client.id)">
          <div class="client-row__top">
            <strong>{{ client.label }}</strong>
            <span class="status-chip" [class.status-chip--ok]="client.configured">
              {{ client.configured ? 'Configured' : 'Pending' }}
            </span>
          </div>
          <div class="client-row__meta">
            Last updated:
            {{ client.updatedAt ? (client.updatedAt | date: 'medium') : 'Never' }}
          </div>
        </button>
      </div>

      <ng-template #noClients>
        <ui-empty-state
          title="No clients found"
          description="No clients match the selected filter.">
        </ui-empty-state>
      </ng-template>
    </section>

    <section class="workspace-card detail-panel" *ngIf="selectedClientId; else selectClientState">
      <div class="panel-head">
        <h3>{{ selectedClientName }} - Payroll Defaults</h3>
        <div class="action-row">
          <button type="button" class="btn btn-secondary" (click)="clearFormToDefaults()">
            Reset to Defaults
          </button>
          <button
            type="button"
            class="btn btn-primary"
            [disabled]="saving || detailLoading"
            (click)="saveClientSettings()">
            {{ saving ? 'Saving...' : 'Save Settings' }}
          </button>
        </div>
      </div>

      <ui-loading-spinner *ngIf="detailLoading" text="Loading client settings..."></ui-loading-spinner>

      <div *ngIf="!detailLoading" class="detail-body">
        <div class="form-grid">
          <label>
            <span>Effective From</span>
            <input type="date" [(ngModel)]="settingsForm.effectiveFrom" />
          </label>
          <label>
            <span>Effective To</span>
            <input type="date" [(ngModel)]="settingsForm.effectiveTo" />
          </label>
          <label>
            <span>Pay Cycle</span>
            <select [(ngModel)]="settingsForm.payCycle">
              <option *ngFor="let cycle of payCycleOptions" [value]="cycle">{{ cycle }}</option>
            </select>
          </label>
          <label>
            <span>Cycle Start Day</span>
            <input type="number" min="1" max="31" [(ngModel)]="settingsForm.cycleStartDay" />
          </label>
          <label>
            <span>Payout Day</span>
            <input type="number" min="1" max="31" [(ngModel)]="settingsForm.payoutDay" />
          </label>
          <label>
            <span>Input Lock Day</span>
            <input type="number" min="1" max="31" [(ngModel)]="settingsForm.lockDay" />
          </label>
        </div>

        <div class="sub-section">
          <h4>Statutory Defaults</h4>
          <div class="toggle-grid">
            <label class="toggle-row">
              <input type="checkbox" [(ngModel)]="settingsForm.statutoryDefaults.pfEnabled" />
              <span>PF enabled</span>
            </label>
            <label class="toggle-row">
              <input type="checkbox" [(ngModel)]="settingsForm.statutoryDefaults.esiEnabled" />
              <span>ESI enabled</span>
            </label>
            <label class="toggle-row">
              <input type="checkbox" [(ngModel)]="settingsForm.statutoryDefaults.ptEnabled" />
              <span>PT enabled</span>
            </label>
            <label class="toggle-row">
              <input type="checkbox" [(ngModel)]="settingsForm.statutoryDefaults.lwfEnabled" />
              <span>LWF enabled</span>
            </label>
          </div>
        </div>

        <div class="sub-section">
          <h4>Validation Rules</h4>
          <div class="toggle-grid">
            <label class="toggle-row">
              <input
                type="checkbox"
                [(ngModel)]="settingsForm.validationRules.strictAttendanceLock" />
              <span>Strict attendance lock</span>
            </label>
            <label class="toggle-row">
              <input
                type="checkbox"
                [(ngModel)]="settingsForm.validationRules.blockNegativeNetPay" />
              <span>Block negative net pay</span>
            </label>
            <label class="toggle-row">
              <input
                type="checkbox"
                [(ngModel)]="settingsForm.validationRules.requireBankAccount" />
              <span>Require bank account for publish</span>
            </label>
            <label class="toggle-row">
              <input type="checkbox" [(ngModel)]="settingsForm.validationRules.requireUanForPf" />
              <span>Require UAN for PF-applicable employees</span>
            </label>
          </div>
        </div>

        <div class="sub-section">
          <h4>Reminders and SLA</h4>
          <div class="form-grid">
            <label>
              <span>Pre-cutoff reminder (days)</span>
              <input
                type="number"
                min="0"
                max="30"
                [(ngModel)]="settingsForm.reminderRules.preCutoffReminderDays" />
            </label>
            <label>
              <span>Pre-payout reminder (days)</span>
              <input
                type="number"
                min="0"
                max="30"
                [(ngModel)]="settingsForm.reminderRules.prePayoutReminderDays" />
            </label>
            <label>
              <span>Escalation SLA (hours)</span>
              <input
                type="number"
                min="1"
                max="168"
                [(ngModel)]="settingsForm.reminderRules.escalationSlaHours" />
            </label>
          </div>
        </div>

        <div class="sub-section">
          <h4>Notes</h4>
          <textarea
            rows="3"
            placeholder="Optional notes about client-level payroll defaults..."
            [(ngModel)]="settingsForm.notes"></textarea>
        </div>

        <div class="sub-section">
          <h4>Save History</h4>
          <label class="summary-input">
            <span>Change summary</span>
            <input
              type="text"
              maxlength="120"
              [(ngModel)]="settingsForm.changeSummary"
              placeholder="Example: Updated lock day and validation rules" />
          </label>
          <div class="history-list" *ngIf="settingsForm.history.length; else noHistory">
            <div class="history-row" *ngFor="let h of settingsForm.history">
              <div class="history-row__meta">
                <strong>{{ h.summary }}</strong>
                <span>{{ h.by }}</span>
              </div>
              <span class="history-time">{{ h.at | date: 'medium' }}</span>
            </div>
          </div>
          <ng-template #noHistory>
            <div class="empty-mini">No save history yet for this client.</div>
          </ng-template>
        </div>
      </div>
    </section>

    <ng-template #selectClientState>
      <section class="workspace-card detail-panel">
        <ui-empty-state
          title="Select a client"
          description="Choose a client from the left panel to configure payroll defaults.">
        </ui-empty-state>
      </section>
    </ng-template>
  </div>
</div>
