<div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
  <ui-page-header
    title="Audit Management"
    description="Schedule, track, and manage compliance audits"
    icon="clipboard-check">
  </ui-page-header>

  <!-- Tabs -->
  <div class="border-b border-gray-200 mb-6">
    <nav class="flex space-x-6 -mb-px">
      <button (click)="activeTab = 'list'" [class]="activeTab === 'list'
        ? 'border-b-2 border-statco-blue-light text-statco-blue-light pb-3 text-sm font-medium'
        : 'text-gray-500 hover:text-gray-700 pb-3 text-sm font-medium'">
        Manage Audits
      </button>
      <button (click)="activeTab = 'create'" [class]="activeTab === 'create'
        ? 'border-b-2 border-statco-blue-light text-statco-blue-light pb-3 text-sm font-medium'
        : 'text-gray-500 hover:text-gray-700 pb-3 text-sm font-medium'">
        + Schedule New
      </button>
    </nav>
  </div>

  <!-- ═══════════════════ LIST TAB ═══════════════════ -->
  <div *ngIf="activeTab === 'list'">
    <!-- Filters -->
    <div class="card mb-6">
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Status</label>
          <select [(ngModel)]="listFilters.status" (ngModelChange)="loadAudits()" class="w-full text-sm rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light">
            <option *ngFor="let s of statusOptions" [value]="s.value">{{ s.label }}</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Client</label>
          <select [(ngModel)]="listFilters.clientId" (ngModelChange)="loadAudits()" class="w-full text-sm rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light">
            <option *ngFor="let c of clientFilterOptions" [value]="c.value">{{ c.label }}</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Year</label>
          <input type="number" [(ngModel)]="listFilters.year" (ngModelChange)="loadAudits()" placeholder="e.g. 2025" class="w-full text-sm rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light" />
        </div>
      </div>
    </div>

    <!-- Loading -->
    <ui-loading-spinner *ngIf="listLoading"></ui-loading-spinner>

    <!-- Empty -->
    <ui-empty-state *ngIf="!listLoading && audits.length === 0"
      icon="clipboard-check"
      title="No audits found"
      description="Adjust your filters or schedule a new audit.">
    </ui-empty-state>

    <!-- Table -->
    <div *ngIf="!listLoading && audits.length > 0">
      <ui-data-table [columns]="auditColumns" [data]="audits" [loading]="listLoading"
        emptyMessage="No audits found.">
        <ng-template uiTableCell="auditCode" let-row>
          <span class="font-mono text-gray-900">{{ row.auditCode || '—' }}</span>
        </ng-template>
        <ng-template uiTableCell="auditType" let-row>{{ row.auditType | titlecase }}</ng-template>
        <ng-template uiTableCell="period" let-row>{{ row.periodCode || row.periodYear }}</ng-template>
        <ng-template uiTableCell="status" let-row>
          <ui-status-badge [status]="row.status"></ui-status-badge>
        </ng-template>
        <ng-template uiTableCell="score" let-row>
          <span class="font-semibold"
            [ngClass]="{
              'text-green-600': row.score >= 80,
              'text-amber-600': row.score >= 50 && row.score < 80,
              'text-red-600': row.score !== null && row.score < 50,
              'text-gray-400': row.score === null || row.score === undefined
            }">
            {{ row.score !== null && row.score !== undefined ? row.score + '%' : '—' }}
          </span>
        </ng-template>
        <ng-template uiTableCell="actions" let-row>
          <div class="flex justify-end gap-2">
            <button *ngFor="let action of getNextStatuses(row.status)"
              (click)="changeStatus(row, action.value)"
              [disabled]="statusUpdating"
              class="text-xs font-medium px-2.5 py-1 rounded-md transition"
              [ngClass]="{
                'bg-blue-50 text-blue-700 hover:bg-blue-100': action.variant === 'primary',
                'bg-red-50 text-red-700 hover:bg-red-100': action.variant === 'danger'
              }">
              {{ action.label }}
            </button>
          </div>
        </ng-template>
      </ui-data-table>
    </div>
  </div>

  <!-- ═══════════════════ CREATE TAB ═══════════════════ -->
  <div *ngIf="activeTab === 'create'">
    <form (ngSubmit)="submit()">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="card">
          <h3 class="text-lg font-semibold text-gray-900 mb-6">Audit Details</h3>
          <div class="space-y-4">
            <div class="form-group">
              <label class="block text-sm font-medium text-gray-700 mb-2">Client *</label>
              <select [(ngModel)]="model.clientId" name="clientId" required (change)="onClientChange()" class="w-full rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light">
                <option value="">-- Select Client --</option>
                <option *ngFor="let c of clients" [value]="c.id">{{ c.clientName }}</option>
              </select>
            </div>

            <div class="form-group">
              <label class="block text-sm font-medium text-gray-700 mb-2">Branch (Optional)</label>
              <select [(ngModel)]="model.branchId" name="branchId" class="w-full rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light">
                <option value="">-- All Branches --</option>
                <option *ngFor="let b of branches" [value]="b.id">{{ b.branchName }}</option>
              </select>
            </div>

            <div class="form-group">
              <label class="block text-sm font-medium text-gray-700 mb-2">Contractor (Optional)</label>
              <select [(ngModel)]="model.contractorUserId" name="contractorUserId" class="w-full rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light">
                <option value="">-- None (Client Audit) --</option>
                <option *ngFor="let ct of contractors" [value]="ct.id">{{ ct.name }}</option>
              </select>
            </div>

            <div class="form-group">
              <label class="block text-sm font-medium text-gray-700 mb-2">Assigned Auditor *</label>
              <select [(ngModel)]="model.assignedAuditorId" name="assignedAuditorId" required class="w-full rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light">
                <option value="">-- Select Auditor --</option>
                <option *ngFor="let a of auditors" [value]="a.id">{{ a.name }}</option>
              </select>
            </div>

            <div class="form-group">
              <label class="block text-sm font-medium text-gray-700 mb-2">Frequency</label>
              <select [(ngModel)]="model.frequency" name="frequency" class="w-full rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light">
                <option *ngFor="let f of frequencies" [ngValue]="f.value">{{ f.label }}</option>
              </select>
            </div>

            <div class="form-group">
              <label class="block text-sm font-medium text-gray-700 mb-2">Audit Type</label>
              <select [(ngModel)]="model.auditType" name="auditType" class="w-full rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light">
                <option *ngFor="let t of auditTypes" [ngValue]="t.value">{{ t.label }}</option>
              </select>
            </div>
          </div>
        </div>

        <div class="card">
          <h3 class="text-lg font-semibold text-gray-900 mb-6">Period & Schedule</h3>
          <div class="space-y-4">
            <div class="form-group">
              <label class="block text-sm font-medium text-gray-700 mb-2">Period Year</label>
              <input type="number" [(ngModel)]="model.periodYear" name="periodYear" class="w-full rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light" />
            </div>

            <div class="form-group">
              <label class="block text-sm font-medium text-gray-700 mb-2">Period Code</label>
              <input type="text" [(ngModel)]="model.periodCode" name="periodCode" placeholder="e.g. 2025-01, 2025-Q1, 2025-H1, 2025" class="w-full rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light" />
            </div>

            <div class="form-group">
              <label class="block text-sm font-medium text-gray-700 mb-2">Due Date (optional)</label>
              <input type="date" [(ngModel)]="model.dueDate" name="dueDate" class="w-full rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light" />
            </div>

            <div class="form-group">
              <label class="block text-sm font-medium text-gray-700 mb-2">Notes (optional)</label>
              <textarea [(ngModel)]="model.notes" name="notes" rows="3" class="w-full rounded-lg border-gray-300 focus:border-statco-blue-light focus:ring-statco-blue-light"></textarea>
            </div>

            <ui-button variant="primary" type="submit" [fullWidth]="true" [disabled]="submitting">
              <svg class="w-4 h-4 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
              </svg>
              {{ submitting ? 'Creating...' : 'Schedule Audit' }}
            </ui-button>
          </div>
        </div>
      </div>
    </form>

    <div *ngIf="error" class="alert alert-error mt-6">{{ error }}</div>
  </div>
</div>
