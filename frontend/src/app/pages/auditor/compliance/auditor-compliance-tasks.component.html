<div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
  <ui-page-header
    title="Compliance Tasks"
    subtitle="Review and audit assigned compliance tasks across branches">
    <ui-button variant="secondary" size="sm" (clicked)="load()">Refresh</ui-button>
  </ui-page-header>

  <!-- KPI Strip -->
  <div class="grid grid-cols-2 sm:grid-cols-5 gap-4 mb-6">
    <ui-stat-card label="Total Tasks" [value]="kpiTotal" color="primary"></ui-stat-card>
    <ui-stat-card label="Submitted" [value]="kpiSubmitted" color="info"></ui-stat-card>
    <ui-stat-card label="In Review" [value]="kpiInReview" color="warning"></ui-stat-card>
    <ui-stat-card label="Approved" [value]="kpiApproved" color="success"></ui-stat-card>
    <ui-stat-card label="Rejected" [value]="kpiRejected" color="error"></ui-stat-card>
  </div>

  <!-- Filters Row -->
  <div class="card mb-4">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 p-4">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Status</label>
        <select class="w-full rounded-lg border-gray-300 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          [(ngModel)]="status" (change)="page=1; load()">
          <option *ngFor="let opt of statusOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
      </div>

      <div class="md:col-span-2">
        <label class="block text-xs font-medium text-gray-600 mb-1">Search</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input class="w-full pl-10 rounded-lg border-gray-300 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                 placeholder="Search by task name, client, branch…"
                 [(ngModel)]="q"
                 (keyup.enter)="page=1; load()" />
        </div>
      </div>

      <div class="flex items-end">
        <button (click)="clearFilters()" class="text-xs text-gray-500 hover:text-gray-700 underline">Clear filters</button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <ui-loading-spinner *ngIf="loading" text="Loading compliance tasks..."></ui-loading-spinner>

  <!-- Empty State -->
  <ui-empty-state *ngIf="!loading && tasks.length === 0"
    title="No tasks found"
    message="No compliance tasks match your current filters. Try adjusting the filters or check back later.">
  </ui-empty-state>

  <!-- Tasks Table -->
  <ui-data-table *ngIf="!loading && tasks.length > 0"
    [columns]="columns" [data]="tasks" [loading]="loading"
    [showPagination]="true" [totalItems]="total" [currentPage]="page" [pageSize]="limit"
    emptyMessage="No compliance tasks found.">
    <ng-template uiTableCell="taskName" let-row>
      <span class="font-medium text-gray-900">{{ taskName(row) }}</span>
    </ng-template>
    <ng-template uiTableCell="client" let-row>{{ clientName(row) }}</ng-template>
    <ng-template uiTableCell="branch" let-row>{{ branchName(row) }}</ng-template>
    <ng-template uiTableCell="type" let-row>
      <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600">{{ complianceType(row) }}</span>
    </ng-template>
    <ng-template uiTableCell="frequency" let-row>
      <span class="capitalize">{{ frequency(row) }}</span>
    </ng-template>
    <ng-template uiTableCell="dueDate" let-row>{{ due(row) }}</ng-template>
    <ng-template uiTableCell="status" let-row>
      <ui-status-badge [status]="statusText(row)" size="sm"></ui-status-badge>
    </ng-template>
    <ng-template uiTableCell="action" let-row>
      <a class="inline-flex items-center gap-1 text-sm font-medium text-blue-600 hover:text-blue-800 transition-colors"
         [routerLink]="['/auditor/compliance/tasks', id(row)]">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
        Review
      </a>
    </ng-template>
  </ui-data-table>
</div>
