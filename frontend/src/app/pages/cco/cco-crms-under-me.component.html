<div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
  <ui-page-header
    title="CRMs Under Me"
    description="Manage and monitor your CRM team"
    icon="user-group">
  </ui-page-header>

  <ui-loading-spinner *ngIf="loading" text="Loading CRMs..."></ui-loading-spinner>

  <!-- Error Banner -->
  <div *ngIf="!loading && error" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 flex items-center justify-between">
    <span>{{ error }}</span>
    <button type="button" (click)="retry()" class="text-red-800 font-semibold hover:underline ml-4">Retry</button>
  </div>

  <ng-container *ngIf="!loading">
    <!-- KPI Strip -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
      <div class="bg-white border border-gray-200 rounded-xl p-4">
        <div class="text-xs text-gray-500 font-medium uppercase">Total CRMs</div>
        <div class="text-2xl font-bold text-gray-900 mt-1">{{ allCrms.length }}</div>
      </div>
      <div class="bg-green-50 border border-green-200 rounded-xl p-4">
        <div class="text-xs text-green-600 font-medium uppercase">Active</div>
        <div class="text-2xl font-bold text-green-700 mt-1">{{ activeCrms }}</div>
      </div>
      <div class="bg-blue-50 border border-blue-200 rounded-xl p-4">
        <div class="text-xs text-blue-600 font-medium uppercase">Total Clients</div>
        <div class="text-2xl font-bold text-blue-700 mt-1">{{ totalClients }}</div>
      </div>
      <div class="bg-red-50 border border-red-200 rounded-xl p-4">
        <div class="text-xs text-red-600 font-medium uppercase">Total Overdue</div>
        <div class="text-2xl font-bold text-red-700 mt-1">{{ totalOverdue }}</div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="flex flex-wrap items-center gap-3 mb-6">
      <div class="relative w-56">
        <input autocomplete="off" id="ccum-search-term" name="searchTerm" type="text" [(ngModel)]="searchTerm" (ngModelChange)="applyFilter()"
          placeholder="Search CRM name..."
          class="w-full pl-9 pr-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
        <svg class="absolute left-2.5 top-2.5 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
      </div>
      <ui-form-select label="Status" [options]="statusOptions" [(ngModel)]="statusFilter" (ngModelChange)="applyFilter()" class="w-44"></ui-form-select>
      <button type="button" (click)="exportCsv()" class="ml-auto inline-flex items-center gap-1 text-sm font-medium text-gray-600 hover:text-gray-900">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        Export
      </button>
      <span class="text-sm text-gray-500">{{ filteredCrms.length }} CRM{{ filteredCrms.length !== 1 ? 's' : '' }}</span>
    </div>

    <!-- DataTable -->
    <div class="card" *ngIf="filteredCrms.length > 0">
      <ui-data-table [columns]="columns" [data]="filteredCrms">
        <ng-template uiTableCell="name" let-row>
          <span class="font-medium text-gray-900">{{ row.name }}</span>
        </ng-template>
        <ng-template uiTableCell="overdueCount" let-row>
          <span [class.text-red-600]="row.overdueCount > 0" [class.font-semibold]="row.overdueCount > 0">
            {{ row.overdueCount ?? 0 }}
          </span>
        </ng-template>
        <ng-template uiTableCell="status" let-row>
          <ui-status-badge [status]="row.status"></ui-status-badge>
        </ng-template>
        <ng-template uiTableCell="lastLogin" let-row>
          {{ row.lastLogin | date:'mediumDate' }}
        </ng-template>
        <ng-template uiTableCell="actions" let-row>
          <ui-button variant="secondary" size="sm" (clicked)="viewCrm(row)">View</ui-button>
        </ng-template>
      </ui-data-table>
    </div>

    <ui-empty-state
      *ngIf="filteredCrms.length === 0"
      title="No CRMs found"
      description="CRMs assigned to you will appear here."
      icon="user-group">
    </ui-empty-state>
  </ng-container>
</div>
