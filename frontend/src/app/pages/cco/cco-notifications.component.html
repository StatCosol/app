<main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
  <ui-page-header 
    title="Notifications (CCO)" 
    description="High-priority system threads relevant to CCO"
    icon="bell">
  </ui-page-header>

  <div class="alert alert-info mb-6">
    <svg class="w-5 h-5 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    Only high-priority system threads relevant to CCO will appear here.
  </div>

  <div class="card">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">Type</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">Subject</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">Created</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">Status</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr class="hover:bg-gray-50">
            <td class="px-6 py-4 text-sm"><span class="badge-warning">SLA Escalation</span></td>
            <td class="px-6 py-4 text-sm font-medium text-gray-900">Client #123 Overdue</td>
            <td class="px-6 py-4 text-sm text-gray-600">2025-12-25</td>
            <td class="px-6 py-4 text-sm"><span class="badge-success">Open</span></td>
            <td class="px-6 py-4 text-sm">
              <button class="btn-primary-sm">View</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</main>
