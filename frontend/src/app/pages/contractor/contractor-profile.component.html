<main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
  <!-- Page Header using PageHeaderComponent -->
  <ui-page-header 
    title="My Profile" 
    description="Your profile information and account details" 
    icon="user">
  </ui-page-header>

  <div class="card">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">Name</label>
        <p class="text-base text-gray-900">{{ user?.name || '-' }}</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">Email</label>
        <p class="text-base text-gray-900">{{ user?.email || '-' }}</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">Role</label>
        <p class="text-base text-gray-900">{{ user?.roleCode || 'CONTRACTOR' }}</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">Client</label>
        <p class="text-base text-gray-900">{{ user?.clientName || '-' }}</p>
      </div>
    </div>

    <div class="alert alert-info mt-6">
      <svg class="w-5 h-5 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      Profile details are managed by your StatCo administrator. If anything looks incorrect, please raise a query from the Support page.
    </div>
  </div>
</main>
