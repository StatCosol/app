<div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
  <div class="flex items-center justify-between mb-6">
    <ui-page-header 
      title="My Tasks" 
      description="Compliance tasks and submissions" 
      icon="clipboard-list">
    </ui-page-header>
    <ui-button 
      variant="primary"
      (clicked)="load()">
      <svg class="w-4 h-4 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Refresh
    </ui-button>
  </div>

  <!-- Filters Card using FormSelectComponent and FormInputComponent -->
  <div class="card mb-6">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <ui-form-select 
        label="Status" 
        [(ngModel)]="filters.status"
        [options]="statusOptions"
        (ngModelChange)="load()">
      </ui-form-select>
      <ui-form-input 
        label="Year" 
        placeholder="Year" 
        [(ngModel)]="filters.year"
        (ngModelChange)="load()">
      </ui-form-input>
      <ui-form-input 
        label="Month" 
        placeholder="Month" 
        [(ngModel)]="filters.month"
        (ngModelChange)="load()">
      </ui-form-input>
    </div>
  </div>

  <!-- Loading State using LoadingSpinnerComponent -->
  <ui-loading-spinner 
    *ngIf="loading" 
    size="lg" 
    text="Loading tasks...">
  </ui-loading-spinner>

  <!-- Mobile Cards (visible on small screens) -->
  <div *ngIf="!loading" class="grid grid-cols-1 gap-4 md:hidden">
    <div *ngFor="let t of tasks" class="card cursor-pointer hover:shadow-md transition-shadow" (click)="openTask(t)">
      <div class="flex items-start justify-between mb-3">
        <h4 class="text-base font-semibold text-gray-900 flex-grow">{{t.compliance?.title || t.complianceTitle || 'Compliance Task'}}</h4>
        <ui-status-badge [status]="t.status"></ui-status-badge>
      </div>
      <div class="space-y-2 text-sm text-gray-600 mb-4">
        <div><span class="font-medium">Branch:</span> {{t.branch?.branchName || '-'}}</div>
        <div>
          <span class="font-medium">Due:</span> {{t.dueDate}} • 
          <span [class]="t.status==='OVERDUE' ? 'text-red-600 font-medium' : 'text-gray-600'">{{dueText(t)}}</span>
        </div>
        <div><span class="font-medium">Evidence:</span> {{t.evidenceCount || 0}}</div>
      </div>
      <ui-button
        variant="primary"
        [fullWidth]="true"
        (clicked)="openTask(t); $event.stopPropagation()">
        Continue
      </ui-button>
    </div>

    <!-- Empty State using EmptyStateComponent -->
    <ui-empty-state
      *ngIf="tasks.length===0"
      title="No tasks found"
      description="There are no tasks matching the selected filters">
    </ui-empty-state>
  </div>

  <!-- Desktop Table using DataTableComponent -->
  <div *ngIf="!loading && tasks.length" class="hidden md:block">
    <ui-data-table
      [columns]="taskColumns"
      [data]="tasks"
      emptyMessage="No tasks found">
      
      <ng-template uiTableCell="dueDate" let-row>
        <div class="text-gray-900">{{row.dueDate}}</div>
        <div [class]="row.status==='OVERDUE' ? 'text-red-600 font-medium text-xs' : 'text-gray-500 text-xs'">{{dueText(row)}}</div>
      </ng-template>

      <ng-template uiTableCell="status" let-row>
        <ui-status-badge [status]="row.status"></ui-status-badge>
      </ng-template>

      <ng-template uiTableCell="evidenceCount" let-value>
        <span class="badge badge-info">{{value || 0}}</span>
      </ng-template>

      <ng-template uiTableCell="actions" let-row>
        <ui-button 
          variant="primary" 
          size="sm"
          (clicked)="openTask(row)">
          Open
        </ui-button>
      </ng-template>
    </ui-data-table>
  </div>
</div>
