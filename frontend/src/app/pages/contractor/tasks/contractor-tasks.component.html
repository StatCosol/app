<div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
  <ui-page-header
    title="My Tasks"
    description="View and manage your compliance tasks and submissions"
    icon="clipboard-list">
  </ui-page-header>

  <!-- Filters Card -->
  <div class="contractor-filter-bar mb-6">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <ui-form-select
        label="Status"
        [(ngModel)]="filters.status"
        [options]="statusOptions"
        (ngModelChange)="load()">
      </ui-form-select>
      <ui-form-select
        label="Year"
        [(ngModel)]="filters.year"
        [options]="yearOptions"
        (ngModelChange)="load()">
      </ui-form-select>
      <ui-form-select
        label="Month"
        [(ngModel)]="filters.month"
        [options]="monthOptions"
        (ngModelChange)="load()">
      </ui-form-select>
      <div class="flex items-end">
        <div class="text-xs text-gray-500" *ngIf="!loading">{{ tasks.length }} tasks found</div>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <ui-loading-spinner
    *ngIf="loading"
    size="lg"
    text="Loading tasks...">
  </ui-loading-spinner>

  <!-- Mobile Cards -->
  <div *ngIf="!loading" class="grid grid-cols-1 gap-3 md:hidden">
    <div *ngFor="let t of tasks"
         class="contractor-card cursor-pointer"
         (click)="openTask(t)">
      <div class="flex items-start justify-between mb-3">
        <h4 class="text-sm font-semibold text-gray-900 flex-grow">{{ t.complianceTitle }}</h4>
        <ui-status-badge [status]="t.status"></ui-status-badge>
      </div>
      <div class="space-y-1.5 text-sm text-gray-600 mb-4">
        <div class="flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
          </svg>
          <span>{{ t.branchName }}</span>
        </div>
        <div class="flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          <span>{{ t.dueDate }}</span>
          <span class="font-medium" [class]="t.status==='OVERDUE' ? 'text-red-600' : 'text-gray-500'">{{ dueText(t) }}</span>
        </div>
        <div class="flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <span>{{ t.evidenceCount || 0 }} evidence files</span>
        </div>
      </div>
      <button
        (click)="openTask(t); $event.stopPropagation()"
        class="w-full py-2 px-4 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
        View Task
      </button>
    </div>

    <ui-empty-state
      *ngIf="tasks.length===0"
      title="No tasks found"
      description="There are no tasks matching the selected filters">
    </ui-empty-state>
  </div>

  <!-- Desktop Table -->
  <div *ngIf="!loading && tasks.length" class="hidden md:block">
    <div class="contractor-card" style="padding:0; overflow:hidden">
      <ui-data-table
        [columns]="taskColumns"
        [data]="tasks"
        emptyMessage="No tasks found">

        <ng-template uiTableCell="dueDate" let-row>
          <div class="text-gray-900">{{ row.dueDate }}</div>
          <div [class]="row.status==='OVERDUE' ? 'text-red-600 font-medium text-xs' : 'text-gray-500 text-xs'">{{ dueText(row) }}</div>
        </ng-template>

        <ng-template uiTableCell="status" let-row>
          <ui-status-badge [status]="row.status"></ui-status-badge>
        </ng-template>

        <ng-template uiTableCell="evidenceCount" let-value>
          <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-700">{{ value || 0 }}</span>
        </ng-template>

        <ng-template uiTableCell="actions" let-row>
          <button
            (click)="openTask(row)"
            class="px-3 py-1.5 bg-indigo-600 text-white text-xs font-medium rounded-lg hover:bg-indigo-700 transition-colors">
            View
          </button>
        </ng-template>
      </ui-data-table>
    </div>
  </div>
</div>
