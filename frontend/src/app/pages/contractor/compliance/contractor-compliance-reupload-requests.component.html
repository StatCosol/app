<div class="p-4">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold">Reupload Requests</h2>
    <button class="px-3 py-2 text-sm border rounded" (click)="load()">Refresh</button>
  </div>

  <div *ngIf="loading" class="text-sm text-gray-500">Loading…</div>

  <div class="overflow-auto border rounded" *ngIf="!loading">
    <table class="min-w-full text-sm">
      <thead class="bg-gray-50">
        <tr>
          <th class="p-2 text-left">Document</th>
          <th class="p-2 text-left">Status</th>
          <th class="p-2 text-left">Remarks</th>
          <th class="p-2 text-left">Upload</th>
          <th class="p-2 text-left">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of rows" class="border-t">
          <td class="p-2">
            <div class="font-medium">{{ title(r) }}</div>
            <button class="text-xs text-blue-600 underline mt-1" (click)="viewRemarks(r)">
              View full remarks
            </button>
          </td>

          <td class="p-2">{{ statusText(r) }}</td>

          <td class="p-2 text-xs text-gray-600">
            {{ remarksPreview(r) || '-' }}
          </td>

          <td class="p-2">
            <input type="file" class="text-xs" (change)="onFileChange(id(r), $event)" />
            <input class="border rounded p-1 text-xs w-full mt-1"
                   placeholder="Note (optional)"
                   [(ngModel)]="note[id(r)]" />
          </td>

          <td class="p-2">
            <button class="px-2 py-1 text-xs border rounded"
                    [disabled]="uploadingId === id(r)"
                    (click)="upload(r)">
              {{ uploadingId === id(r) ? 'Uploading...' : 'Upload' }}
            </button>

            <button class="px-2 py-1 text-xs bg-black text-white rounded ml-2"
                    [disabled]="submittingId === id(r)"
                    (click)="submit(r)">
              {{ submittingId === id(r) ? 'Submitting...' : 'Submit' }}
            </button>
          </td>
        </tr>

        <tr *ngIf="rows.length === 0">
          <td colspan="5" class="p-4 text-center text-gray-500">No reupload requests.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
