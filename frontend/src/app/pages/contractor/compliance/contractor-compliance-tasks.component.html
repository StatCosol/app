<div class="p-4">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold">My Compliance Tasks</h2>
    <button class="px-3 py-2 text-sm border rounded" (click)="load()">Refresh</button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-4">
    <select class="border rounded p-2 text-sm" [(ngModel)]="status" (ngModelChange)="load()">
      <option value="">All Status</option>
      <option value="OPEN">OPEN</option>
      <option value="STARTED">STARTED</option>
      <option value="SUBMITTED">SUBMITTED</option>
      <option value="IN_REVIEW">IN_REVIEW</option>
      <option value="APPROVED">APPROVED</option>
      <option value="REJECTED">REJECTED</option>
    </select>

    <input class="border rounded p-2 text-sm md:col-span-2"
           placeholder="Search…" [(ngModel)]="q"
           (keyup.enter)="load()" />
  </div>

  <div *ngIf="loading" class="text-sm text-gray-500">Loading…</div>

  <ui-data-table *ngIf="!loading"
    [columns]="columns" [data]="tasks" [loading]="loading"
    emptyMessage="No tasks found.">
    <ng-template uiTableCell="task" let-row>{{ taskName(row) }}</ng-template>
    <ng-template uiTableCell="due" let-row>{{ due(row) }}</ng-template>
    <ng-template uiTableCell="status" let-row>{{ statusText(row) }}</ng-template>
    <ng-template uiTableCell="action" let-row>
      <a class="text-blue-600 hover:text-blue-800 font-medium text-sm"
         [routerLink]="['/contractor/compliance/tasks', id(row)]">Open</a>
    </ng-template>
  </ui-data-table>
</div>
